 <rect class="bar2" x="902" y="156" width="48" height="26" rx="13"/>
 <rect class="bar2" x="740" y="188" width="48" height="26" rx="13"/>
 <rect class="bar2" x="794" y="188" width="48" height="26" rx="13"/>

 <!-- day-of-week chip row: 7 small squares, some filled -->
