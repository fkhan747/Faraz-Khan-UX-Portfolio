 <rect class="bar2" x="740" y="402" width="36" height="14" rx="4"/>
 <rect class="fld" x="788" y="398" width="210" height="22" rx="4"/>

 <!-- button -->
 <rect class="btn" x="888" y="448" width="112" height="34" rx="17"/>
 <rect class="bar2" x="916" y="461" width="56" height="8" rx="4" fill="#9a9a93"/>
</g>

<!-- option labels -->
<text class="opt" x="40" y="68">Option A</text>
<text class="opt" x="380" y="68">Option B</text>
<text class="opt" x="720" y="68">Option C</text>

<!-- chosen pill on Option C -->
<g transform="translate(928,53)"><rect class="chosen" width="92" height="18" rx="9"/><text x="46" y="13" text-anchor="middle" style="font-size:9px;fill:#fff;font-weight:600">&#10003; chosen</text></g>

<!-- bottom annotations -->
<text class="ann" x="40" y="540">Cadence + days hidden in dropdowns.</text>
<text class="ann" x="40" y="556">Too many clicks to read the schedule.</text>

<text class="ann" x="380" y="540">Segmented cadence, one time for all.</text>
<text class="ann" x="380" y="556">Cleaner, but per-day times impossible.</text>

<text class="ann" x="720" y="540">Pills + per-day time inputs.</text>
<text class="ann" x="720" y="556">Reads at a glance. Shipped.</text>
</svg>