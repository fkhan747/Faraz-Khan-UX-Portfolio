 <rect class="fld" x="60" y="238" width="260" height="38" rx="6"/>
 <rect class="bar2" x="74" y="252" width="150" height="10" rx="5"/>
 <path class="chev" d="M296 252 l9 0 l-4.5 8 z"/>

 <!-- time label + dropdown -->
