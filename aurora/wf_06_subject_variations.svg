</g>

<text class="ann" x="40" y="540">Radio list of 5 options.</text>
<text class="ann" x="40" y="556">Compare at a glance. Shipped.</text>

<text class="ann" x="380" y="540">Cards, two per row.</text>
<text class="ann" x="380" y="556">Ate space, only 2 visible at once.</text>

<text class="ann" x="720" y="540">Dropdown of variations.</text>
<text class="ann" x="720" y="556">Hid the comparison entirely.</text>
</svg>