<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KnowledgeOS - Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#e7eaf0;
  font-family:'IBM Plex Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

/* frame label */
.koframe-label{max-width:1440px;margin:16px auto 9px;padding:0 8px;
  font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.07em;
  text-transform:uppercase;color:#727b8c;display:flex;align-items:center;gap:9px;}
.koframe-label b{color:#3a4252;}
.koframe-label .dot{width:6px;height:6px;border-radius:50%;
  background:linear-gradient(135deg,#0E9CA6,#4589ff,#a56eff);}

/* scaler wrapper + app */
.kowrap{width:100%;display:flex;justify-content:center;align-items:flex-start;overflow:hidden;}
.koapp{width:1440px;height:1024px;flex-shrink:0;transform-origin:top center;display:flex;
  background:#f2f4f8;border-radius:16px;overflow:hidden;position:relative;
  box-shadow:0 28px 64px rgba(20,30,60,.26),0 4px 14px rgba(20,30,60,.10);
  border:1px solid rgba(255,255,255,.6);}

/* rail keeps its own inline dark styling; add height + nav states */
.korail{height:100%!important;}
.koni{cursor:pointer;transition:background .13s ease,color .13s ease;}
.koni:hover{background:rgba(255,255,255,.055)!important;color:#dfe5ef!important;}
.koni.active{background:rgba(69,137,255,.12)!important;color:#fff!important;}
.koni.active::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;
  border-radius:3px;background:linear-gradient(180deg,#0E9CA6,#4589ff,#a56eff);}
.kologo{transition:opacity .13s;}
.kologo:hover{opacity:.82;}

/* content stage */
.kostage{flex:1;min-width:0;height:100%;display:flex;}
.koview{flex:1;min-width:0;height:100%;display:flex;overflow:hidden;}
.koview ::-webkit-scrollbar{width:10px;height:10px;}
.koview ::-webkit-scrollbar-thumb{background:#cdd3dd;border-radius:6px;border:3px solid transparent;background-clip:content-box;}
.koview ::-webkit-scrollbar-thumb:hover{background:#b6bdc9;background-clip:content-box;}
.koview [style*="IBM Plex Mono"]{font-family:'IBM Plex Mono',ui-monospace,monospace !important;}
.koni,.kologo{ -webkit-tap-highlight-color:transparent; }

/* ---------- copilot launcher (FAB) ---------- */
.kocb-fab{position:absolute;right:26px;bottom:26px;width:54px;height:54px;border:none;border-radius:50%;
  cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0E9CA6 0%,#4589ff 52%,#a56eff 100%);
  box-shadow:0 10px 26px rgba(69,137,255,.42);transition:transform .15s,box-shadow .15s;}
.kocb-fab:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 14px 32px rgba(69,137,255,.5);}
.kocb-fab svg{width:23px;height:23px;}

/* ---------- copilot drawer ---------- */
.kocb{position:absolute;top:0;right:0;width:384px;max-width:88%;height:100%;background:#fff;z-index:60;
  display:flex;flex-direction:column;transform:translateX(105%);transition:transform .32s cubic-bezier(.4,0,.2,1);
  box-shadow:-18px 0 50px rgba(20,30,60,.20);}
.kocb.open{transform:translateX(0);}
.kocb-head{flex-shrink:0;padding:16px 18px;display:flex;align-items:center;gap:11px;
  background:linear-gradient(135deg,#0E9CA6 0%,#4589ff 52%,#a56eff 100%);color:#fff;}
.kocb-head .mk{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;}
.kocb-head .ti{font-size:14px;font-weight:600;line-height:1.2;}
.kocb-head .sub{font-size:11px;opacity:.85;}
.kocb-x{margin-left:auto;width:30px;height:30px;border:none;background:rgba(255,255,255,.16);border-radius:8px;
  cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;line-height:1;}
.kocb-x:hover{background:rgba(255,255,255,.28);}
.kocb-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;background:#f7f8fa;}
.kocb-m{display:flex;gap:9px;align-items:flex-start;}
.kocb-m.me{flex-direction:row-reverse;}
.kocb-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:9.5px;font-weight:700;color:#fff;}
.kocb-av.ai{background:linear-gradient(135deg,#0E9CA6,#4589ff,#a56eff);}
.kocb-av.me{background:linear-gradient(135deg,#1192e8,#a56eff);}
.kocb-bub{max-width:80%;padding:10px 13px;border-radius:13px;font-size:13px;line-height:1.5;color:#21272a;
  background:#fff;border:1px solid #e9edf2;}
.kocb-m.me .kocb-bub{background:#21272a;color:#fff;border-color:#21272a;}
.kocb-bub b{font-weight:600;}
.kocb-did{margin-top:8px;font-size:11px;font-weight:600;color:#0E9CA6;
  display:inline-flex;align-items:center;gap:5px;background:rgba(14,156,166,.09);
  padding:4px 9px;border-radius:7px;}
.kocb-chips{flex-shrink:0;padding:10px 14px 0;display:flex;flex-wrap:wrap;gap:7px;background:#fff;}
.kocb-chip{font-size:12px;font-weight:500;color:#2f6df0;background:#eef3ff;border:1px solid #dce6ff;
  padding:7px 11px;border-radius:18px;cursor:pointer;transition:background .12s;}
.kocb-chip:hover{background:#e0eaff;}
.kocb-in{flex-shrink:0;padding:12px 14px 14px;display:flex;gap:8px;background:#fff;border-top:1px solid #eef0f3;}
.kocb-in input{flex:1;height:40px;border:1px solid #dde2e9;border-radius:10px;padding:0 13px;font-size:13px;
  font-family:inherit;outline:none;color:#21272a;}
.kocb-in input:focus{border-color:#4589ff;box-shadow:0 0 0 3px rgba(69,137,255,.14);}
.kocb-in button{width:40px;height:40px;border:none;border-radius:10px;cursor:pointer;flex-shrink:0;
  background:linear-gradient(135deg,#0E9CA6,#4589ff,#a56eff);display:flex;align-items:center;justify-content:center;}
.kocb-in button svg{width:17px;height:17px;}
.kodots{display:inline-flex;gap:4px;align-items:center;padding:2px 0;}
.kodots span{width:6px;height:6px;border-radius:50%;background:#9aa3b2;animation:kobounce 1.2s infinite;}
.kodots span:nth-child(2){animation-delay:.18s;}
.kodots span:nth-child(3){animation-delay:.36s;}
@keyframes kobounce{0%,60%,100%{transform:translateY(0);opacity:.45;}30%{transform:translateY(-4px);opacity:1;}}

/* ---------- toast ---------- */
.kotoast{position:fixed;left:50%;bottom:30px;transform:translate(-50%,18px);z-index:200;
  background:#21272a;color:#fff;font-size:13px;font-weight:500;padding:12px 18px;border-radius:10px;
  box-shadow:0 12px 30px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  max-width:80vw;text-align:center;}
.kotoast.show{opacity:1;transform:translate(-50%,0);}

@media(max-width:560px){
  .koframe-label{font-size:10px;}
  .kocb{width:100%;}
}

</style>
</head>
<body>

<div class="koframe-label"><span class="dot"></span>KnowledgeOS · Interactive prototype - <b>click anything</b>; use the rail to move around, or open the assistant&nbsp;✦</div>

<div id="kowrap" class="kowrap">
  <div id="koapp" class="koapp">

    <aside style="width:256px;flex-shrink:0;height:100%;display:flex;flex-direction:column;background:linear-gradient(170deg,#131b30 0%,#0e1422 55%,#0b101c 100%);color:#f4f4f4;padding:16px 12px;border-right:1px solid rgba(255,255,255,.04);">

    <div class="kologo" data-nav="overview" style="display:flex;align-items:center;gap:10px;padding:6px 6px 14px;cursor:pointer;">
      <div style="width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0E9CA6 0%,#4589ff 52%,#a56eff 100%);box-shadow:0 4px 12px rgba(69,137,255,.35);">
        <svg width="17" height="17" viewBox="0 0 16 16" fill="#fff"><path d="M8 1l1.55 4.35L14 7l-4.45 1.65L8 13l-1.55-4.35L2 7l4.45-1.65z"></path></svg>
      </div>
      <div style="line-height:1.15;">
        <div style="font-size:14px;font-weight:600;letter-spacing:-.01em;">KnowledgeOS</div>
        <div style="font-size:11.5px;color:#8a93a6;">Acme Corp</div>
      </div>
    </div>

    <button data-nav="ask" style="width:100%;height:40px;border:none;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:9px;padding:0 14px;color:#fff;font-family:inherit;font-size:13.5px;font-weight:600;background:linear-gradient(135deg,#0E9CA6 0%,#4589ff 52%,#a56eff 100%);box-shadow:0 6px 16px rgba(69,137,255,.3);">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round"><path d="M8 3.2v9.6M3.2 8h9.6"></path></svg>
      New question
    </button>

    <nav style="margin-top:20px;display:flex;flex-direction:column;gap:2px;">
      <div style="font-size:10.5px;font-weight:600;letter-spacing:.08em;color:#5d6679;text-transform:uppercase;padding:0 12px 8px;">Navigate</div>

      <div class="koni" data-nav="overview" data-view="overview" style="position:relative;display:flex;align-items:center;gap:11px;height:38px;padding:0 12px;border-radius:8px;color:#aab2c2;font-size:13.5px;font-weight:500;"><svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="4.6" height="4.6" rx="1"></rect><rect x="8.9" y="2.5" width="4.6" height="4.6" rx="1"></rect><rect x="2.5" y="8.9" width="4.6" height="4.6" rx="1"></rect><rect x="8.9" y="8.9" width="4.6" height="4.6" rx="1"></rect></svg> Overview</div>

      <div class="koni" data-nav="ask" data-view="ask" style="position:relative;display:flex;align-items:center;gap:11px;height:38px;padding:0 12px;border-radius:8px;color:#aab2c2;font-size:13.5px;font-weight:500;"><svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 3.3h11v7.2H6.7L4 12.8v-2.3H2.5z"></path><path d="M6 6.6h4M6 8.3h2.6"></path></svg> Ask</div>

      <div class="koni" data-nav="saved" data-view="saved" style="position:relative;display:flex;align-items:center;gap:11px;height:38px;padding:0 12px;border-radius:8px;color:#aab2c2;font-size:13.5px;font-weight:500;"><svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2.6h8v11l-4-2.6-4 2.6z"></path></svg> Saved answers</div>

      <div class="koni" data-nav="sources" data-view="sources" style="position:relative;display:flex;align-items:center;gap:11px;height:38px;padding:0 12px;border-radius:8px;color:#aab2c2;font-size:13.5px;font-weight:500;"><svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="8" cy="4" rx="5" ry="2"></ellipse><path d="M3 4v8c0 1.05 2.24 1.9 5 1.9s5-.85 5-1.9V4M3 8c0 1.05 2.24 1.9 5 1.9s5-.85 5-1.9"></path></svg> Sources</div>

      <div class="koni" data-nav="insights" data-view="insights" style="position:relative;display:flex;align-items:center;gap:11px;height:38px;padding:0 12px;border-radius:8px;color:#aab2c2;font-size:13.5px;font-weight:500;"><svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2.6 13.2V2.8M2.6 13.2h10.8"></path><path d="M5.2 11V8.4M8 11V5.2M10.8 11V6.8"></path></svg> Insights</div>
    </nav>

    <div data-nav="insights" style="cursor:pointer;margin-top:18px;border-radius:8px;padding:13px 14px;background:linear-gradient(135deg,rgba(14,156,166,.16),rgba(165,110,255,.16));border:1px solid rgba(255,255,255,.08);">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:11.5px;color:#aab2c2;font-weight:500;">Knowledge health</span>
        <span style="font-size:14px;font-weight:700;background:linear-gradient(90deg,#2ad0c0,#7aa8ff,#c79bff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">82%</span>
      </div>
      <div style="margin-top:9px;height:5px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;">
        <div style="width:82%;height:100%;border-radius:3px;background:linear-gradient(90deg,#0E9CA6,#4589ff,#a56eff);"></div>
      </div>
    </div>

    <div style="flex:1;"></div>

    <div style="display:flex;align-items:center;gap:11px;height:38px;padding:0 12px;border-radius:8px;color:#aab2c2;font-size:13.5px;font-weight:500;">
      <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.1"></circle><path d="M8 1.6v1.7M8 12.7v1.7M14.4 8h-1.7M3.3 8H1.6M12.5 3.5l-1.2 1.2M4.7 11.3l-1.2 1.2M12.5 12.5l-1.2-1.2M4.7 4.7L3.5 3.5"></path></svg>
      Settings
    </div>

    <div style="margin-top:8px;display:flex;align-items:center;gap:11px;padding:10px 8px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);">
      <div style="width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;background:linear-gradient(135deg,#1192e8,#a56eff);">SO</div>
      <div style="line-height:1.25;min-width:0;flex:1;">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Sam Okonkwo</div>
        <div style="font-size:11px;color:#8a93a6;">Product Ops · Admin</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#6b7488" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"></path></svg>
    </div>
  </aside>

    <div class="kostage">
      <div id="koview" class="koview"></div>
    </div>

    <!-- copilot launcher -->
    <button id="kocbBtn" class="kocb-fab" aria-label="Ask KnowledgeOS"><svg viewBox="0 0 16 16" fill="#fff"><path d="M8 1l1.55 4.35L14 7l-4.45 1.65L8 13l-1.55-4.35L2 7l4.45-1.65z"></path></svg></button>

    <!-- copilot drawer -->
    <div id="kocb" class="kocb">
      <div class="kocb-head">
        <span class="mk"><svg viewBox="0 0 16 16" fill="#fff"><path d="M8 1l1.55 4.35L14 7l-4.45 1.65L8 13l-1.55-4.35L2 7l4.45-1.65z"></path></svg></span>
        <div>
          <div class="ti">KnowledgeOS AI</div>
          <div class="sub">Answers from Acme Corp's sources</div>
        </div>
        <button id="kocbClose" class="kocb-x" aria-label="Close">&times;</button>
      </div>
      <div id="kocbMsgs" class="kocb-msgs"></div>
      <div id="kocbChips" class="kocb-chips"></div>
      <div class="kocb-in">
        <input id="kocbIn" type="text" placeholder="Ask about Acme's knowledge…" autocomplete="off">
        <button id="kocbSend" aria-label="Send"><svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8L2.5 2.8 4.3 8l-1.8 5.2z"></path><path d="M4.3 8H14"></path></svg></button>
      </div>
    </div>

  </div>
</div>

<div id="kotoast" class="kotoast"></div>

<script type="text/html" data-view="overview">
<!-- ============ MAIN ============ -->
  <div style="flex:1;height:100%;display:flex;flex-direction:column;min-width:0;">

    <header style="height:48px;flex-shrink:0;background:#fff;border-bottom:1px solid #dde1e6;display:flex;align-items:center;justify-content:space-between;padding:0 24px;">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;">
        <span style="color:#697077;">Workspace</span>
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="#a2a9b0" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 4l4 4-4 4"></path></svg>
        <span style="color:#161616;font-weight:600;">Overview</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <button style="width:34px;height:34px;border:none;background:transparent;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#42484f" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2a3.4 3.4 0 0 0-3.4 3.4c0 2.9-1.2 3.9-1.2 3.9h9.2s-1.2-1-1.2-3.9A3.4 3.4 0 0 0 8 2z"></path><path d="M6.7 12.5a1.4 1.4 0 0 0 2.6 0"></path></svg>
          <span style="position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:#ee5396;border:1.5px solid #fff;"></span>
        </button>
        <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;color:#fff;background:linear-gradient(135deg,#1192e8,#a56eff);">SO</div>
      </div>
    </header>

    <!-- Scroll content: main + aside -->
    <div style="flex:1;overflow:auto;display:flex;gap:24px;padding:26px 24px 30px;">

      <!-- MAIN COLUMN -->
      <div style="flex:1;min-width:0;">

        <!-- HERO -->
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:20px;">
          <div style="min-width:0;">
            <h1 style="margin:0;font-size:27px;font-weight:600;letter-spacing:-.02em;">Good morning, Sam</h1>
            <div style="margin-top:8px;display:flex;align-items:flex-start;gap:9px;max-width:680px;">
              <div style="width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0E9CA6 0%,#4589ff 52%,#a56eff 100%);box-shadow:0 3px 8px rgba(69,137,255,.28);">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="#fff"><path d="M8 1l1.55 4.35L14 7l-4.45 1.65L8 13l-1.55-4.35L2 7l4.45-1.65z"></path></svg>
              </div>
              <p style="margin:0;font-size:13.5px;line-height:1.6;color:#42484f;">Knowledge health dipped 3 points this week - 2 stale sources and a rising data-residency gap are dragging it down. <strong style="font-weight:600;color:#21272a;">3 things are worth doing today.</strong></p>
            </div>
          </div>
          <div style="flex-shrink:0;text-align:right;padding-top:4px;">
            <div style="font-size:12.5px;font-weight:500;color:#697077;white-space:nowrap;">Monday, 16 June 2026</div>
          </div>
        </div>

        <!-- KPI CARDS -->
        <div style="margin-top:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">

          <div style="border-radius:8px;padding:15px 17px;color:#fff;background:linear-gradient(135deg,#4589ff 0%,#1192e8 100%);box-shadow:0 8px 20px rgba(17,146,232,.18);cursor:pointer;">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <span style="font-size:11.5px;font-weight:500;color:rgba(255,255,255,.88);">Questions answered</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3.5h10v6H7l-3 2.3V9.5H3z"></path><path d="M6.3 6.4c0-.9.7-1.5 1.7-1.5s1.7.6 1.7 1.4c0 1.2-1.5 1-1.5 1.9"></path><path d="M8 8.9v.05"></path></svg>
            </div>
            <div style="margin-top:11px;font-size:28px;font-weight:600;letter-spacing:-.02em;line-height:1;font-family:'IBM Plex Mono',monospace;">1,284</div>
            <div style="margin-top:9px;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.18);">
              <svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12.5V4M4.5 7L8 3.5 11.5 7"></path></svg>18% vs last week
            </div>

<script>
(function(){

  function $(id){return document.getElementById(id);}
  function $all(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s));}
  function txt(el){return (el.textContent||'').replace(/\s+/g,' ').trim();}
  var tpl = {};

  /* ---------------- toast ---------------- */
  var toastTimer;
  function toast(msg){
    var t=$('kotoast'); if(!t) return;
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove('show');},2600);
  }

  /* ---------------- scaler ---------------- */
  function fit(){
    var stage=$('kowrap'), app=$('koapp'); if(!stage||!app) return;
    var s=Math.min(1, stage.clientWidth/1440);
    app.style.transform='scale('+s+')';
    stage.style.height=(1024*s+40)+'px';
  }

  /* ---------------- router ---------------- */
  function setActiveNav(view){
    var sec=SECTION_OF[view]||view;
    $all('.koni').forEach(function(n){ n.classList.toggle('active', n.getAttribute('data-view')===sec); });
  }
  function go(view){
    if(VIEWS.indexOf(view)<0) view='overview';
    var host=$('koview'); if(!host) return;
    host.innerHTML = tpl[view] || '';
    setActiveNav(view);
    host.scrollTop=0;
    try{ wireReused(view); }catch(e){}
    if(location.hash!=='#'+view){ try{history.replaceState(null,'','#'+view);}catch(e){} }
  }
  window.go=go;

  /* ------------- reused-screen navigations (text-matched, pixel-exact content) ------------- */
  function innermost(scope, text, contains){
    var all=$all('*',scope).filter(function(el){
      var t=txt(el);
      return contains ? (t.indexOf(text)>=0 && t.length<text.length+44 && el.children.length<=5) : (t===text);
    });
    return all.filter(function(el){return !all.some(function(o){return o!==el && el.contains(o);});});
  }
  function pointerUp(el, scope){
    var node=el, hops=0;
    while(node && node!==scope && hops<6){
      try{ if(getComputedStyle(node).cursor==='pointer') return node; }catch(e){}
      node=node.parentElement; hops++;
    }
    return el;
  }
  function nav(scope, text, view, contains, climb){
    innermost(scope, text, contains).forEach(function(el){
      var target = climb ? pointerUp(el, scope) : el;
      if(target.__nav) return; target.__nav=1;
      target.style.cursor='pointer';
      target.addEventListener('click', function(e){ e.stopPropagation(); go(view); });
    });
  }
  function actByText(scope, text, fn, contains){
    innermost(scope, text, contains).forEach(function(el){
      if(el.__act) return; el.__act=1;
      el.style.cursor='pointer';
      el.addEventListener('click', function(e){ e.stopPropagation(); fn(); });
    });
  }
  function wireReused(view){
    var host=$('koview');
    if(view==='overview'){
      ['Questions answered','Active people','Avg. confidence','Knowledge health'].forEach(function(k){ nav(host,k,'insights',false,true); });
      nav(host,'Review gaps','insights',false,true);
      nav(host,'Re-sync source','provenance',false,true);
      nav(host,'Add a source','add-source',false,true);
      nav(host,'Review impact','provenance',false,true);
      nav(host,'View all 41 topics','insights',true,true);
      ['Refund & credits','Expense & reimbursement','Data residency','Parental & leave','Security review'].forEach(function(t){ nav(host,t,'ask',true,true); });
    }
    if(view==='ask'){
      ['Enterprise Refund Policy','Revenue Ops Handbook','2024 Enterprise Agreement'].forEach(function(n){ nav(host,n,'provenance',true,true); });
      // inline citation chips: leaf nodes whose text is exactly 1/2/3
      $all('*',host).filter(function(el){return el.children.length===0 && /^[1-3]$/.test(txt(el));})
        .forEach(function(el){ if(el.__nav)return; el.__nav=1; el.style.cursor='pointer'; el.addEventListener('click',function(e){e.stopPropagation();go('provenance');}); });
      actByText(host,'Save',function(){ toast('Answer saved to Saved answers'); setTimeout(function(){go('saved');},550); },false);
    }
    if(view==='provenance'){
      nav(host,'Answer','ask',false,true);
    }
    if(view==='insights'){
      ['PTO carry-over','home-office purchase','data residency','parental-leave top-up','co-working membership','security-review SLA']
        .forEach(function(kw){ nav(host,kw,'ask',true,true); });
    }
  }

  /* ---------------- copilot ---------------- */
  function openCopilot(){ $('kocb').classList.add('open'); setTimeout(function(){var i=$('kocbIn'); if(i)i.focus();},220); }
  function closeCopilot(){ $('kocb').classList.remove('open'); }
  function cbPush(role, html){
    var m=$('kocbMsgs');
    var av = role==='ai'
      ? '<span class="kocb-av ai"><svg width="11" height="11" viewBox="0 0 16 16" fill="#fff"><path d="M8 1l1.55 4.35L14 7l-4.45 1.65L8 13l-1.55-4.35L2 7l4.45-1.65z"></path></svg></span>'
      : '<span class="kocb-av me">SO</span>';
    m.insertAdjacentHTML('beforeend','<div class="kocb-m '+role+'">'+av+'<div class="kocb-bub">'+html+'</div></div>');
    m.scrollTop=m.scrollHeight;
  }
  function cbChips(list){ $('kocbChips').innerHTML=list.map(function(c){return '<span class="kocb-chip" data-chip="'+c.replace(/"/g,'')+'">'+c+'</span>';}).join(''); }
  function cbType(){ var m=$('kocbMsgs'); m.insertAdjacentHTML('beforeend','<div class="kocb-m ai" id="kocbType"><span class="kocb-av ai"><svg width="11" height="11" viewBox="0 0 16 16" fill="#fff"><path d="M8 1l1.55 4.35L14 7l-4.45 1.65L8 13l-1.55-4.35L2 7l4.45-1.65z"></path></svg></span><div class="kocb-bub"><span class="kodots"><span></span><span></span><span></span></span></div></div>'); m.scrollTop=m.scrollHeight; }
  function cbStop(){ var t=$('kocbType'); if(t)t.remove(); }
  function cbSend(){
    var inp=$('kocbIn'); var q=(inp.value||'').trim(); if(!q) return;
    cbPush('me', q.replace(/</g,'&lt;')); inp.value=''; cbType();
    setTimeout(function(){ cbStop(); botReply(q); }, 650);
  }
  function did(label, view){ setTimeout(function(){ go(view); }, 480); return '<div class="kocb-did">✦ Opened '+label+'</div>'; }
  function botReply(q){
    var s=q.toLowerCase();
    if(/(gdpr|data deletion|right to be forgotten|erasure)/.test(s)){ cbPush('ai','When a verified deletion request comes in, Revenue Ops logs it and Engineering purges the record within <b>30 days</b> across primary and backup stores. Opening the full cited answer.'+did('the answer','ask')); cbChips(['Where is this sourced?','Save this answer','Show coverage gaps']); return; }
    if(/(refund|credit|money back)/.test(s)){ cbPush('ai','Enterprise refunds are issued as <b>account credits within 5 business days</b>, per the 2024 enterprise agreement update. Opening the answer with its sources.'+did('the answer','ask')); cbChips(['Open the source','Is this still current?','Save this answer']); return; }
    if(/(residency|region|where.*hosted|data location)/.test(s)){ cbPush('ai','<b>EU, UK and US</b> data residency are fully supported; <b>APAC is partial</b>, routed via Singapore - which is also one of your rising coverage gaps. Opening Insights.'+did('Insights','insights')); cbChips(['Open the answer','Add a source','Show all gaps']); return; }
    if(/(gap|unanswered|missing|coverage|no source|can.?t answer)/.test(s)){ cbPush('ai','You have <b>41 unanswered topics</b>. The biggest are <b>PTO carry-over</b> and <b>parental-leave top-up</b> - both asked repeatedly with no source. Opening Insights.'+did('Insights','insights')); cbChips(['Add a source','Which are asked most?','Open Overview']); return; }
    if(/(health|score|how healthy)/.test(s)){ cbPush('ai','<b>Knowledge health is 82%</b>, down 3 points this week - dragged by the stale 2024 Enterprise Agreement and a growing data-residency gap. Opening Insights.'+did('Insights','insights')); cbChips(['What\'s stale?','Re-sync a source','Open Overview']); return; }
    if(/(stale|out of date|outdated|re-?sync|re-?index|freshness)/.test(s)){ cbPush('ai','Two sources need attention - the <b>2024 Enterprise Agreement</b> is 8 months stale and cited in 14 answers. Opening Sources.'+did('Sources','sources')); cbChips(['Add a new source','Open Insights','What cites it?']); return; }
    if(/(add|upload|connect|import|new).*(source|doc|file|drive|notion)/.test(s)||/add a source/.test(s)){ cbPush('ai','Let\'s add a source - I\'ll index it and make it answerable in about two minutes. Opening Add source.'+did('Add source','add-source')); cbChips(['Connect Google Drive','Paste a URL','Back to Sources']); return; }
    if(/(saved|my answer|bookmark)/.test(s)){ cbPush('ai','Here are the answers you\'ve saved to the Acme workspace - re-open any to see its sources.'+did('Saved answers','saved')); cbChips(['Ask something new','Show coverage gaps']); return; }
    if(/(provenance|citation|cite|where.*from|source for|trace|proof)/.test(s)){ cbPush('ai','Every answer traces back to a document - nothing invented. Here\'s the provenance for the refund answer, down to the exact passage.'+did('Provenance','provenance')); cbChips(['Open the answer','Is the source fresh?']); return; }
    if(/(overview|home|today|summary|status|state of|dashboard)/.test(s)){ cbPush('ai','Here\'s the state of Acme\'s knowledge: <b>health 82%</b> (down 3), <b>1,284 questions answered</b> this week, and 3 things worth your attention. Opening your overview.'+did('Overview','overview')); cbChips(['What needs attention?','Show coverage gaps']); return; }
    if(/(ask|question|answer)/.test(s)&&s.length<26){ cbPush('ai','Ask me anything about Acme\'s knowledge and I\'ll answer from your sources with citations. Opening Ask.'+did('Ask','ask')); cbChips(['What\'s our refund SLA?','How do we handle GDPR deletion?']); return; }
    if(/^(hi|hey|hello|yo)\b/.test(s)&&s.length<14){ cbPush('ai','Hi Sam 👋 I can answer from Acme\'s sources, surface coverage gaps, or jump you anywhere. Try <b>"what\'s our refund SLA?"</b>, <b>"show coverage gaps"</b>, or <b>"what\'s stale?"</b>'); cbChips(['What\'s our refund SLA?','Show coverage gaps','What\'s stale?']); return; }
    cbPush('ai','I can answer from your sources, show what\'s missing, check freshness, or navigate for you. Want to start with one of these?');
    cbChips(['What\'s our refund SLA?','Show coverage gaps','Add a source','Open Insights']);
  }

  /* ---------------- one delegated click handler (data-* then catch-all) ---------------- */
  function nearestInteractive(node, root){
    while(node && node!==root){
      if(node.tagName==='BUTTON'||node.tagName==='A') return node;
      if(node.getAttribute && node.getAttribute('role')==='button') return node;
      try{ if(getComputedStyle(node).cursor==='pointer') return node; }catch(e){}
      node=node.parentElement;
    }
    return null;
  }
  function bootHandlers(){
    var app=$('koapp');
    app.addEventListener('click', function(e){
      var t=e.target.closest('[data-nav],[data-action],[data-toast]');
      if(t){
        var nv=t.getAttribute('data-nav'), ac=t.getAttribute('data-action'), tm=t.getAttribute('data-toast');
        if(nv!==null){ go(nv); return; }
        if(tm!==null){ toast(tm); return; }
        if(ac!==null){ handleAction(ac); return; }
      }
      // catch-all: any interactive element with no explicit handler still shows what it does
      var el=nearestInteractive(e.target, app);
      if(el){
        var label=(el.getAttribute('aria-label')||txt(el)||'').trim();
        label = label.length>42 ? label.slice(0,42)+'…' : label;
        toast(label ? label+' - (demo)' : 'Action (demo)');
      }
    });
    // copilot launcher + drawer
    $('kocbBtn').addEventListener('click', openCopilot);
    $('kocbClose').addEventListener('click', closeCopilot);
    $('kocbSend').addEventListener('click', cbSend);
    $('kocbIn').addEventListener('keydown', function(e){ if(e.key==='Enter') cbSend(); });
    $('kocbChips').addEventListener('click', function(e){ var c=e.target.closest('.kocb-chip'); if(c){ $('kocbIn').value=c.getAttribute('data-chip'); cbSend(); } });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeCopilot(); });
    window.addEventListener('resize', fit);
  }
  function handleAction(a){
    switch(a){
      case 'add-source-submit': toast('Source queued - indexing now (demo)'); setTimeout(function(){go('sources');},650); break;
      case 'open-copilot': openCopilot(); break;
      default: toast('Action (demo)');
    }
  }

  /* ---------------- boot ---------------- */
  function boot(){
    // pull templates out of the DOM
    $all('script[type="text/html"][data-view]').forEach(function(sc){ tpl[sc.getAttribute('data-view')]=sc.textContent; });
    bootHandlers();
    fit();
    var h=(location.hash||'').replace('#','');
    go(VIEWS.indexOf(h)>=0 ? h : 'overview');
    // greet in copilot
    cbPush('ai','Hi Sam 👋 Ask me anything about Acme\'s knowledge - I answer from your sources with citations, and I can jump you anywhere.');
    cbChips(['What\'s our refund SLA?','Show coverage gaps','What\'s stale?']);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();

</script>
