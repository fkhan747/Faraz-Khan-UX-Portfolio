<svg style="width:100%;background:#f1f0ec;border-radius:12px" viewBox="0 0 1080 580" xmlns="http://www.w3.org/2000/svg">
<defs>
 <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
  <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="17" result="n"/>
  <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
 </filter>
</defs>
<style>
 text{font-family:Inter,system-ui,-apple-system,sans-serif}
 .frame{fill:#fcfcfb;stroke:#b1b1a9;stroke-width:2}
 .chrome{fill:#d3d3cd}
 .bar{fill:#e4e4df}
 .bar2{fill:#d5d5cf}
 .fld{fill:#ffffff;stroke:#bdbdb6;stroke-width:1.4;stroke-dasharray:5 3}
 .card{fill:#ffffff;stroke:#c4c4be;stroke-width:1.4}
 .btn{fill:#b9b9b2}
 .opt{font-size:13px;font-weight:700;fill:#6a6a64}
 .ann{font-size:10.5px;fill:#8f8f88}
 .lbl{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:.1em;fill:#9a9a93}
 .chosen{fill:#5c5c56}
 .ringbg{fill:none;stroke:#deded8;stroke-width:14}
 .ringfg{fill:none;stroke:#7a7a73;stroke-width:14;stroke-linecap:round}
 .stepdone{fill:#6a6a64}
 .steptodo{fill:#ffffff;stroke:#c4c4be;stroke-width:1.6}
 .conn{stroke:#cdcdc7;stroke-width:2}
</style>

<text x="40" y="32" class="lbl">APPLICATION PROGRESS &#183; STATUS EXPLORATION</text>
<text x="40" y="66" class="opt">Option A</text>
<text x="410" y="66" class="opt">Option B</text>
<text x="780" y="66" class="opt">Option C</text>
<g transform="translate(560,53)"><rect class="chosen" width="92" height="18" rx="9"/><text x="46" y="13" text-anchor="middle" style="font-size:9px;fill:#fff;font-weight:600">&#10003; chosen</text></g>

<text x="40" y="540" class="ann">Top progress bar.</text>
<text x="40" y="556" class="ann">Compact, but the path felt hidden.</text>
<text x="410" y="540" class="ann">Vertical stepper.</text>
<text x="410" y="556" class="ann">Every stage visible and tappable.</text>
<text x="780" y="540" class="ann">Progress ring.</text>
<text x="780" y="556" class="ann">Pretty, less scannable for 8 stages.</text>

<g filter="url(#sk)">
 <!-- A: top progress bar + current step card -->
 <g transform="translate(40,80)">
  <rect class="frame" width="260" height="440" rx="24"/>
  <rect class="chrome" x="95" y="12" width="70" height="13" rx="6.5"/>
  <rect class="bar" x="22" y="15" width="22" height="6" rx="3"/><rect class="bar" x="214" y="15" width="24" height="6" rx="3"/>
  <rect class="bar" x="22" y="52" width="216" height="10" rx="5"/>
  <rect class="chosen" x="22" y="52" width="92" height="10" rx="5"/>
  <rect class="bar2" x="22" y="74" width="70" height="8" rx="4"/>
  <rect class="card" x="22" y="104" width="216" height="180" rx="10"/>
  <rect class="bar2" x="34" y="120" width="110" height="11" rx="4"/>
  <rect class="bar" x="34" y="146" width="48" height="6" rx="3"/><rect class="fld" x="34" y="156" width="192" height="22" rx="5"/>
  <rect class="bar" x="34" y="190" width="48" height="6" rx="3"/><rect class="fld" x="34" y="200" width="192" height="22" rx="5"/>
  <rect class="bar" x="34" y="238" width="120" height="6" rx="3"/>
  <rect class="bar" x="34" y="252" width="150" height="6" rx="3"/>
  <rect class="btn" x="22" y="362" width="216" height="34" rx="17"/>
  <rect x="104" y="375" width="38" height="8" rx="4" fill="#f4f4f1"/>
  <polygon points="150,375 150,383 157,379" fill="#f4f4f1"/>
  <rect class="chrome" x="95" y="422" width="70" height="6" rx="3"/>
 </g>
 <!-- B: vertical stepper (chosen) -->
 <g transform="translate(410,80)">
  <rect class="frame" width="260" height="440" rx="24" stroke="#8f8f88" stroke-width="2.5"/>
  <rect class="chrome" x="95" y="12" width="70" height="13" rx="6.5"/>
  <rect class="bar" x="22" y="15" width="22" height="6" rx="3"/><rect class="bar" x="214" y="15" width="24" height="6" rx="3"/>
  <rect class="bar2" x="22" y="50" width="130" height="13" rx="3"/>
  <line class="conn" x1="40" y1="96" x2="40" y2="370"/>
  <circle class="stepdone" cx="40" cy="92" r="9"/><rect class="bar2" x="60" y="84" width="120" height="8" rx="4"/><rect class="bar" x="60" y="97" width="84" height="5" rx="2.5"/>
  <circle class="stepdone" cx="40" cy="136" r="9"/><rect class="bar2" x="60" y="128" width="104" height="8" rx="4"/><rect class="bar" x="60" y="141" width="84" height="5" rx="2.5"/>
  <circle class="stepdone" cx="40" cy="180" r="9"/><rect class="bar2" x="60" y="172" width="116" height="8" rx="4"/><rect class="bar" x="60" y="185" width="84" height="5" rx="2.5"/>
  <circle class="steptodo" cx="40" cy="224" r="9"/><rect class="bar2" x="60" y="216" width="96" height="8" rx="4"/><rect class="bar" x="60" y="229" width="84" height="5" rx="2.5"/>
  <circle class="steptodo" cx="40" cy="268" r="9"/><rect class="bar2" x="60" y="260" width="110" height="8" rx="4"/><rect class="bar" x="60" y="273" width="84" height="5" rx="2.5"/>
  <circle class="steptodo" cx="40" cy="312" r="9"/><rect class="bar2" x="60" y="304" width="100" height="8" rx="4"/><rect class="bar" x="60" y="317" width="84" height="5" rx="2.5"/>
  <circle class="steptodo" cx="40" cy="356" r="9"/><rect class="bar2" x="60" y="348" width="120" height="8" rx="4"/><rect class="bar" x="60" y="361" width="84" height="5" rx="2.5"/>
  <rect class="chrome" x="95" y="422" width="70" height="6" rx="3"/>
 </g>
 <!-- C: progress ring + next step -->
 <g transform="translate(780,80)">
  <rect class="frame" width="260" height="440" rx="24"/>
  <rect class="chrome" x="95" y="12" width="70" height="13" rx="6.5"/>
  <rect class="bar" x="22" y="15" width="22" height="6" rx="3"/><rect class="bar" x="214" y="15" width="24" height="6" rx="3"/>
  <circle class="ringbg" cx="130" cy="150" r="68"/>
  <circle class="ringfg" cx="130" cy="150" r="68" stroke-dasharray="192 235" transform="rotate(-90 130 150)"/>
  <rect class="bar2" x="108" y="138" width="44" height="14" rx="4"/>
  <rect class="bar" x="100" y="160" width="60" height="7" rx="3"/>
  <rect class="card" x="22" y="262" width="216" height="86" rx="10"/>
  <rect class="bar" x="34" y="276" width="64" height="6" rx="3"/>
  <rect class="bar2" x="34" y="292" width="120" height="10" rx="4"/>
  <rect class="bar" x="34" y="312" width="150" height="6" rx="3"/>
  <polygon points="214,300 214,312 222,306" class="ringfg" fill="#9a9a93" stroke="none"/>
  <rect class="chrome" x="95" y="422" width="70" height="6" rx="3"/>
 </g>
</g>
</svg>
