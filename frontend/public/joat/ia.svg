<svg style="width:100%;background:#f8f8f6;border-radius:12px;" viewBox="0 0 1080 560" xmlns="http://www.w3.org/2000/svg">
<style>text{font-family:Inter,sans-serif}.root{font-size:13px;font-weight:700;fill:#fff;text-anchor:middle}.h{font-size:11px;font-weight:700;fill:#fff;text-anchor:middle}.n{font-size:11px;fill:#33323a;text-anchor:middle}.cap{font-size:9px;fill:#8f8f88;text-anchor:middle}.ln{stroke:#c9c8c2;stroke-width:1.4;fill:none}</style>

<!-- top-right utility cluster -->
<rect x="838" y="22" width="100" height="28" rx="14" fill="#ffffff" stroke="#d8d7d1"/>
