 <rect class="bar" x="744" y="130" width="86" height="150" rx="4" fill="#dcdcd6" stroke="#bdbdb6" stroke-width="1.4"/>
 <rect class="bar2" x="752" y="140" width="48" height="11" rx="2"/>
 <rect class="fld" x="752" y="160" width="70" height="18" rx="2"/>
 <rect class="fld" x="752" y="184" width="70" height="18" rx="2"/>
 <circle cx="760" cy="222" r="8" fill="#cfcfc9"/>
 <circle cx="780" cy="222" r="8" fill="#c2c2bc"/>
 <circle cx="800" cy="222" r="8" fill="#d9d9d3"/>
 <rect class="btn" x="752" y="248" width="70" height="18" rx="9"/>
 <rect class="bar" x="890" y="300" width="100" height="160" rx="4" fill="#dcdcd6" stroke="#bdbdb6" stroke-width="1.4"/>
 <rect class="bar2" x="898" y="312" width="54" height="11" rx="2"/>
 <rect class="fld" x="898" y="332" width="80" height="16" rx="2"/>
 <rect class="fld" x="898" y="354" width="80" height="16" rx="2"/>
 <rect class="bar2" x="898" y="384" width="44" height="20" rx="2" fill="#c7c7c1"/>
 <rect class="btn" x="898" y="430" width="80" height="20" rx="10"/>
 <rect class="bar" x="800" y="370" width="78" height="90" rx="4" fill="#d6d6d0" stroke="#bdbdb6" stroke-width="1.4"/>
 <rect class="bar2" x="808" y="380" width="40" height="10" rx="2"/>
 <rect class="fld" x="808" y="396" width="62" height="16" rx="2"/>
 <rect class="fld" x="808" y="418" width="62" height="16" rx="2"/>
</g>
<!-- crisp text layer -->
<text class="lbl" x="40" y="32">DESIGN STUDIO &#183; LAYOUT EXPLORATION</text>
<text class="opt" x="40" y="70">Option A</text>
<text class="opt" x="380" y="70">Option B</text>
<text class="opt" x="720" y="70">Option C</text>
<g transform="translate(248,53)"><rect class="chosen" width="92" height="18" rx="9"/><text x="46" y="13" text-anchor="middle" style="font-size:9px;fill:#fff;font-weight:600">&#10003; chosen</text></g>
<text class="ann" x="40" y="540">Left rail, preview centred.</text>
<text class="ann" x="40" y="556">Calmest, preview stays the hero. Shipped.</text>
<text class="ann" x="380" y="540">Top toolbar of controls.</text>
<text class="ann" x="380" y="556">Pushed the preview down, felt cramped.</text>
<text class="ann" x="720" y="540">Floating tool panels.</text>
<text class="ann" x="720" y="556">Covered the tee the user is judging.</text>
</svg>