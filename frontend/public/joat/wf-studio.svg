 <path d="M174 150 l16 -10 24 0 16 10 -14 22 -12 -6 0 60 -12 0 0 -60 -12 6 z" fill="#cccbc4"/>
 <rect class="bar2" x="170" y="430" width="48" height="10" rx="2"/>
 <!-- right summary -->
 <rect class="bar" x="264" y="110" width="66" height="390" rx="3"/>
 <rect class="bar2" x="272" y="122" width="48" height="12" rx="2"/>
 <rect class="fld" x="272" y="146" width="50" height="16" rx="2"/>
 <rect class="fld" x="272" y="170" width="50" height="16" rx="2"/>
 <rect class="bar2" x="272" y="206" width="40" height="22" rx="2" fill="#c7c7c1"/>
 <rect class="btn" x="272" y="452" width="50" height="22" rx="11"/>

 <!-- ===== OPTION B : top toolbar / preview below ===== -->
 <rect class="frame" x="380" y="80" width="300" height="430" rx="6"/>
 <rect class="chrome" x="380" y="80" width="300" height="20" rx="6"/>
 <circle cx="394" cy="90" r="3" fill="#b1b1a9"/>
 <circle cx="404" cy="90" r="3" fill="#b1b1a9"/>
 <circle cx="414" cy="90" r="3" fill="#b1b1a9"/>
 <!-- top toolbar -->
 <rect class="bar" x="390" y="110" width="280" height="60" rx="3"/>
 <rect class="fld" x="400" y="122" width="46" height="18" rx="2"/>
 <rect class="fld" x="454" y="122" width="46" height="18" rx="2"/>
 <circle cx="520" cy="131" r="8" fill="#cfcfc9"/>
 <circle cx="540" cy="131" r="8" fill="#c2c2bc"/>
 <rect class="fld" x="560" y="122" width="46" height="18" rx="2"/>
 <rect class="btn" x="616" y="122" width="44" height="18" rx="9"/>
 <rect class="bar2" x="400" y="148" width="60" height="11" rx="2"/>
 <rect class="bar2" x="470" y="148" width="60" height="11" rx="2"/>
 <rect class="bar2" x="540" y="148" width="60" height="11" rx="2"/>
 <!-- preview below (pushed down, cramped) -->
