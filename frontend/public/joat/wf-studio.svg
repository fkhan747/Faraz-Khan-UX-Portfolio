 <rect class="bar" x="730" y="110" width="280" height="390" rx="3" fill="#eeeee9"/>
 <path d="M835 175 l20 -12 28 0 20 12 -16 26 -15 -7 0 96 -18 0 0 -96 -15 7 z" fill="#cccbc4"/>
