<svg style="width:100%;background:#f1f0ec;border-radius:12px" viewBox="0 0 1080 580" xmlns="http://www.w3.org/2000/svg">
<defs>
 <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
  <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
  <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
 </filter>
</defs>
<style>
 text{font-family:Inter,system-ui,-apple-system,sans-serif}
 .frame{fill:#fcfcfb;stroke:#b1b1a9;stroke-width:2}
 .chrome{fill:#d3d3cd}
 .bar{fill:#e4e4df}
 .bar2{fill:#d5d5cf}
 .fld{fill:#ffffff;stroke:#bdbdb6;stroke-width:1.4;stroke-dasharray:5 3}
 .btn{fill:#b9b9b2}
 .opt{font-size:13px;font-weight:700;fill:#6a6a64}
 .ann{font-size:10.5px;fill:#8f8f88}
 .lbl{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:.1em;fill:#9a9a93}
 .chosen{fill:#5c5c56}
 .chev{fill:#a8a8a2}
</style>
<g filter="url(#sk)">
 <!-- ===== OPTION A : left rail / centre preview / right summary ===== -->
 <rect class="frame" x="40" y="80" width="300" height="430" rx="6"/>
 <rect class="chrome" x="40" y="80" width="300" height="20" rx="6"/>
 <circle cx="54" cy="90" r="3" fill="#b1b1a9"/>
 <circle cx="64" cy="90" r="3" fill="#b1b1a9"/>
 <circle cx="74" cy="90" r="3" fill="#b1b1a9"/>
 <!-- left rail -->
 <rect class="bar" x="50" y="110" width="74" height="390" rx="3"/>
 <rect class="bar2" x="58" y="120" width="58" height="14" rx="2"/>
 <rect class="fld" x="58" y="142" width="58" height="22" rx="2"/>
 <rect class="fld" x="58" y="170" width="58" height="22" rx="2"/>
 <rect class="bar2" x="58" y="206" width="40" height="11" rx="2"/>
 <circle cx="65" cy="232" r="9" fill="#cfcfc9"/>
 <circle cx="87" cy="232" r="9" fill="#c2c2bc"/>
 <circle cx="109" cy="232" r="9" fill="#d9d9d3"/>
 <rect class="bar2" x="58" y="258" width="50" height="11" rx="2"/>
 <rect class="fld" x="58" y="278" width="58" height="20" rx="2"/>
 <rect class="fld" x="58" y="304" width="58" height="20" rx="2"/>
 <rect class="fld" x="58" y="330" width="58" height="20" rx="2"/>
 <rect class="btn" x="58" y="360" width="58" height="18" rx="9"/>
