 <rect class="bar2" x="400" y="480" width="40" height="11" rx="2"/>
 <rect class="btn" x="606" y="478" width="54" height="16" rx="8"/>

 <!-- ===== OPTION C : floating panels over canvas ===== -->
 <rect class="frame" x="720" y="80" width="300" height="430" rx="6"/>
 <rect class="chrome" x="720" y="80" width="300" height="20" rx="6"/>
 <circle cx="734" cy="90" r="3" fill="#b1b1a9"/>
 <circle cx="744" cy="90" r="3" fill="#b1b1a9"/>
 <circle cx="754" cy="90" r="3" fill="#b1b1a9"/>
