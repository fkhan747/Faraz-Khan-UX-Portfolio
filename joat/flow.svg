<svg style="width:100%;background:#f8f8f6;border-radius:12px;" viewBox="0 0 1080 440" xmlns="http://www.w3.org/2000/svg"><style>text{font-family:Inter,sans-serif}.t{font-size:11px;fill:#fff;font-weight:600;text-anchor:middle}.ts{font-size:8px;fill:rgba(255,255,255,0.72);text-anchor:middle}.ar{stroke:#999;stroke-width:1.2;fill:none;marker-end:url(#af)}.lane{font-size:9px;fill:#8a8a86;font-weight:700;text-anchor:start;letter-spacing:0.5px}.lg{font-size:10px;fill:#3a3a38;text-anchor:start}</style><defs><marker id="af" markerHeight="6" markerWidth="6" orient="auto" refX="8" refY="5" viewBox="0 0 10 10"><path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-linecap="round" stroke-width="1.5"/></marker></defs><text class="lane" x="24" y="34">RAISER</text><g><rect x="24" y="44" width="142" height="50" rx="10" fill="#E9573F"/><text class="t" x="95" y="66">Sign Up</text><text class="ts" x="95" y="80">create account</text></g><g><rect x="200" y="44" width="142" height="50" rx="10" fill="#E9573F"/><text class="t" x="271" y="66">Design Studio</text><text class="ts" x="271" y="80">design a tee</text></g><g><rect x="376" y="44" width="142" height="50" rx="10" fill="#E9573F"/><text class="t" x="447" y="66">Set Price &amp; Goal</text><text class="ts" x="447" y="80">price + target</text></g><g><rect x="552" y="44" width="142" height="50" rx="10" fill="#E9573F"/><text class="t" x="623" y="66">Add Description</text><text class="ts" x="623" y="80">campaign story</text></g><g><rect x="728" y="44" width="142" height="50" rx="10" fill="#E9573F"/><text class="t" x="799" y="66">Launch</text><text class="ts" x="799" y="80">go live</text></g><g><rect x="904" y="44" width="142" height="50" rx="10" fill="#E9573F"/><text class="t" x="975" y="66">Promote</text><text class="ts" x="975" y="80">FB ads + social</text></g><line class="ar" x1="166" y1="69" x2="196" y2="69"/><line class="ar" x1="342" y1="69" x2="372" y2="69"/><line class="ar" x1="518" y1="69" x2="548" y2="69"/><line class="ar" x1="694"