<text x="40" y="32" class="lbl">APPLICATIONS DASHBOARD &#183; LIST EXPLORATION</text>
<text x="40" y="66" class="opt">Option A</text>
<text x="410" y="66" class="opt">Option B</text>
<text x="780" y="66" class="opt">Option C</text>
<g transform="translate(560,53)"><rect class="chosen" width="92" height="18" rx="9"/><text x="46" y="13" text-anchor="middle" style="font-size:9px;fill:#fff;font-weight:600">&#10003; chosen</text></g>

<text x="40" y="540" class="ann">Plain list rows.</text>
<text x="40" y="556" class="ann">Fast, but status was invisible.</text>
<text x="410" y="540" class="ann">Status cards.</text>
<text x="410" y="556" class="ann">Stage and flags surfaced upfront.</text>
<text x="780" y="540" class="ann">Grouped by stage.</text>
<text x="780" y="556" class="ann">Powerful, but heavy for daily use.</text>

