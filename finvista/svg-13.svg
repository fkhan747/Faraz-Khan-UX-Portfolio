 .ann{font-size:10.5px;fill:#8f8f88}
 .lbl{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:.1em;fill:#9a9a93}
 .chosen{fill:#5c5c56}
 .chev{fill:#a8a8a2}
</style>

<text x="40" y="32" class="lbl">LOAN APPLICATION FORM &#183; LAYOUT EXPLORATION</text>
<text x="40" y="66" class="opt">Option A</text>
<text x="410" y="66" class="opt">Option B</text>
<text x="780" y="66" class="opt">Option C</text>
<g transform="translate(948,53)"><rect class="chosen" width="92" height="18" rx="9"/><text x="46" y="13" text-anchor="middle" style="font-size:9px;fill:#fff;font-weight:600">&#10003; chosen</text></g>

<text x="40" y="540" class="ann">One long scrolling form.</text>
<text x="40" y="556" class="ann">30+ fields in a row felt endless.</text>
<text x="410" y="540" class="ann">Grouped accordion.</text>
<text x="410" y="556" class="ann">Cleaner, but progress got buried.</text>
<text x="780" y="540" class="ann">Stepped wizard, 11 clear steps.</text>
<text x="780" y="556" class="ann">The direction we shipped.</text>

